name: Infra Deploy

# Manual lane for re-applying infra/main.bicep against the configured
# resource group. Trigger is workflow_dispatch only — IAM/IaC changes
# stay off the push-to-main path so the per-push deploy lane in
# deploy.yml stays fast and the federated-credential subject for this
# job is bound to `repo:<owner>/<repo>:environment:production`.
#
# What this workflow does NOT do:
#   - Apply infra/budget.bicep. The OIDC service principal provisioned by
#     infra/setup-oidc.sh only has RG-scoped Contributor; budget.bicep is
#     subscription-scoped and remains operator-applied.
#   - Run `az deployment group create --mode complete`. Incremental mode
#     (the default) is required by the declarative-idempotent-iac
#     constraint inherited from 01-azure-app-service-deploy.
#   - Bootstrap the OIDC trust. That is a one-time operator step
#     performed by infra/setup-oidc.sh.
on:
  workflow_dispatch:
    inputs:
      appServicePlanSku:
        description: "App Service Plan SKU. F1 (free) is the default; promote to B1 only when cold-start latency or the daily CPU minute cap becomes a problem (see infra/README.md § F1 ↔ B1 promotion criteria)."
        type: choice
        default: F1
        options:
          - F1
          - B1

# OIDC token exchange via azure/login@v2 — the only credential surface.
# No client secrets, publish profiles, or service-principal passwords are
# ever exchanged (constraint: 01-azure-app-service-deploy.no-long-lived-azure-secrets).
permissions:
  id-token: write
  contents: read

# Allow only one in-flight infra apply per RG so two manual dispatches
# don't race for the same deployment slot.
concurrency:
  group: infra-deploy-${{ vars.AZURE_RESOURCE_GROUP }}
  cancel-in-progress: false

jobs:
  apply:
    name: What-if + apply main.bicep
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OIDC login. Note the absence of `client-secret` — only client-id
      # + tenant-id + subscription-id are passed (constraint:
      # 01-azure-app-service-deploy.no-long-lived-azure-secrets).
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Preview the change set before mutating the RG. The exit code is
      # non-zero only on hard errors (missing template, auth failure,
      # bad parameters); a non-empty diff is reported but does not fail
      # the step. Operators read the diff in the run log.
      - name: az deployment group what-if (infra/main.bicep)
        run: |
          set -euo pipefail
          az deployment group what-if \
            -g ${{ vars.AZURE_RESOURCE_GROUP }} \
            -f infra/main.bicep \
            -p webAppName=${{ vars.AZURE_WEBAPP_NAME }} \
               appServicePlanSku=${{ inputs.appServicePlanSku }}

      # Apply the same template + parameters that what-if just previewed.
      # `az deployment group create` defaults to incremental mode — never
      # pass `--mode complete` here (declarative-idempotent-iac).
      - name: az deployment group create (infra/main.bicep)
        run: |
          set -euo pipefail
          az deployment group create \
            -g ${{ vars.AZURE_RESOURCE_GROUP }} \
            -f infra/main.bicep \
            -p webAppName=${{ vars.AZURE_WEBAPP_NAME }} \
               appServicePlanSku=${{ inputs.appServicePlanSku }}
